<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>歐馬 · 選配單</title><style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"PingFang TC","Noto Sans TC","Microsoft JhengHei",system-ui,sans-serif;background:#f4f4f2;color:#171717;-webkit-text-size-adjust:100%}
.gate{position:fixed;inset:0;background:#171717;display:flex;align-items:center;justify-content:center;padding:24px;z-index:10}
.gcard{background:#fff;border-radius:18px;padding:34px 28px;max-width:360px;width:100%;text-align:center;box-shadow:0 20px 50px rgba(0,0,0,.3)}
.glogo{display:flex;justify-content:center;margin-bottom:16px}.glogo img{height:40px;width:auto}
.gcard h1{font-size:22px;margin-bottom:6px}.gcard p{color:#777;font-size:14px;margin-bottom:18px}
.gcard input{width:100%;border:1px solid #d2d2ce;border-radius:10px;padding:13px;font-size:20px;text-align:center;letter-spacing:.3em;margin-bottom:10px}
.gsel{width:100%;box-sizing:border-box;border:1px solid #d2d2ce;border-radius:10px;padding:13px;font-size:17px;margin-bottom:10px;background:#fff;color:#171717}
.perr{color:#c0392b;font-size:13px;min-height:18px;margin-bottom:6px}
.pbtn,.donebtn,.copybtn{background:#171717;color:#fff;border:none;border-radius:10px;padding:13px 18px;font-size:16px;font-weight:800;width:100%;cursor:pointer}
.hd{background:#171717;color:#fff;padding:16px 18px;display:flex;align-items:center;gap:12px}
.hlogo img{height:30px;width:auto;display:block}.hco{font-weight:800;font-size:17px}.hsub{font-size:12px;color:#bbb;letter-spacing:.05em}
.wrap{max-width:1100px;margin:0 auto;padding:16px}
.tools #search{width:100%;border:1px solid #d2d2ce;border-radius:12px;padding:12px 14px;font-size:15px;background:#fff;margin-bottom:10px}
.tabs{display:flex;gap:8px;flex-wrap:wrap}
.tab{border:1px solid #d2d2ce;background:#fff;color:#555;border-radius:999px;padding:8px 16px;font-size:14px;font-weight:700;cursor:pointer}
.tab.on{background:#171717;color:#fff;border-color:#171717}
.repsel{background:#fff;border:1px solid #e5e5e2;border-radius:12px;padding:12px 14px;margin-bottom:14px}
.repsel .rlbl{font-size:13px;font-weight:800;color:#666;display:block;margin-bottom:8px}
.rp{border:1px solid #d2d2ce;background:#fff;color:#444;border-radius:999px;padding:8px 16px;font-size:14px;font-weight:700;cursor:pointer;margin:0 8px 8px 0}
.rp.on{background:#171717;color:#fff;border-color:#171717}
.guide{background:#fff;border:1px solid #e5e5e2;border-radius:14px;padding:16px 18px;margin-bottom:16px}
.guide .gt{font-weight:800;font-size:16px;color:#171717;margin-bottom:12px}
.guide .gs{display:flex;gap:10px;align-items:flex-start;margin-bottom:10px;font-size:15px;line-height:1.55;color:#5a4708}
.guide .gs:last-child{margin-bottom:0}
.guide .gn{flex:none;width:24px;height:24px;border-radius:50%;background:#171717;color:#fff;font-weight:800;font-size:14px;display:flex;align-items:center;justify-content:center}
.guide b{color:#171717}
.sub{font-weight:800;color:#171717;margin:16px 0 10px;font-size:13.5px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
.card{background:#fff;border:1px solid #e5e5e2;border-radius:14px;padding:13px;display:flex;flex-direction:column;gap:7px}
.ph{margin:-14px -14px 0;border-radius:14px 14px 0 0;overflow:hidden;background:#efeee9}.ph img{width:100%;aspect-ratio:1/1;object-fit:cover;display:block}
.mdl{align-self:flex-start;font-size:11.5px;font-weight:700;color:#333;background:#f0f0ee;border:1px solid #dcdcd7;border-radius:6px;padding:2px 7px}
.nm{font-size:15px;font-weight:700;line-height:1.35}
.incl{font-size:12px;color:#2f7d4f;font-weight:700}.note{font-size:12px;color:#b3541e;font-weight:600}
.ft{margin-top:auto;display:flex;align-items:flex-end;justify-content:space-between;gap:8px;padding-top:4px}
.pr{font-size:19px;font-weight:800;font-variant-numeric:tabular-nums}.pr .cur{font-size:12px;font-weight:700;color:#888;margin-right:2px}.pr .tbd{font-size:14px;color:#6b6b66}

.empty,.cempty{color:#999;text-align:center;padding:26px;font-size:14px}
.cart{background:#fff;border:1px solid #e5e5e2;border-radius:16px;padding:16px;margin-top:20px}
.cart-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}.cart-h h2{font-size:18px}
.ln{border-top:1px solid #eee;padding:10px 0}.lh{display:flex;justify-content:space-between;gap:8px}.lnm{font-weight:700}.lmd{font-size:12px;color:#888}
.rmb{border:none;background:none;color:#c0392b;font-size:16px;cursor:pointer}
.lb{display:flex;justify-content:space-between;align-items:center;margin-top:6px}
.stp{display:flex;align-items:center;gap:10px}.stp button{width:28px;height:28px;border:1px solid #d2d2ce;background:#f7f7f5;border-radius:7px;font-size:17px;font-weight:800;cursor:pointer}.stp b{min-width:20px;text-align:center}
.lt{font-weight:700;font-variant-numeric:tabular-nums}
.cart-t{display:flex;justify-content:space-between;align-items:center;border-top:2px solid #171717;margin-top:10px;padding-top:12px;font-size:16px}.cart-t b{font-size:24px}
.donebtn{margin-top:14px}

.copybtn{margin-top:8px}.hint{font-size:12px;color:#888;margin-top:8px}

<div id="gate" class="gate"><div class="gcard"><div id="glogo" class="glogo"></div><h1>選配單</h1><p>請輸入您的姓名、車型與業務代碼</p><input id="cname" placeholder="您的姓名／稱呼" style="letter-spacing:normal;font-size:17px"><select id="ccar" class="gsel"><option value="">請選擇車型</option></select><input id="pin" type="text" autocapitalize="off" autocorrect="off" spellcheck="false" placeholder="輸入業務給您的代碼"><div id="perr" class="perr"></div><button id="pinbtn" class="pbtn">開啟</button></div></div>
<div id="app" style="display:none">
<header class="hd"><div id="hlogo" class="hlogo"></div><div><div id="hco" class="hco"></div><div class="hsub">選配單 · 挑選您想要的項目</div></div></header>
<div class="wrap">
<div class="guide"><div class="gt">📋 使用方法</div><div class="gs"><span class="gn">1</span><div><b>挑項目</b>：想要的項目，按卡片右下角的圓形「＋」加入（會變成黑色打勾 ✓）；不要了再按一次就取消。冷氣只能擇一，選了會自動附「整車配線」。</div></div><div class="gs"><span class="gn">2</span><div><b>填需求</b>：拉到最下面「我的選擇」，清單沒有、想加裝的寫在「其他需求」，想跟業務說的話寫在「備註」。</div></div><div class="gs"><span class="gn">3</span><div><b>送出</b>：按「完成，產生代碼給業務」，再按「複製代碼」，貼到 LINE 傳給業務就完成了！</div></div></div>
<div class="repsel"><span class="rlbl">請先選擇為您服務的業務</span><div id="reps"></div></div>
<div class="tools"><div id="tabs" class="tabs"></div></div>
<div id="cat"></div>
<div class="cart"><div class="cart-h"><h2>我的選擇</h2><span id="cnt">0 項</span></div><div id="lines"></div><div class="cart-t"><span>合計</span><b id="tot">NT$0</b></div><div class="extra"><label class="exlbl">其他需求（清單沒有、想加裝的寫這裡）</label><textarea id="cother" rows="2" placeholder="例如：想加裝…"></textarea><label class="exlbl">備註</label><textarea id="cnote" rows="2" placeholder="其他想跟業務說的話"></textarea></div><button id="donebtn" class="donebtn">完成，產生代碼給業務</button><div id="codewrap" style="display:none"><textarea id="code" readonly></textarea><button id="copybtn" class="copybtn">複製代碼</button><p class="hint">複製後用 LINE 傳給業務，業務貼上即可帶入報價單。</p></div></div>

var IDX={},cart={},active="__all",kw="",chosenRep=null,custName="",custCar="";
D.cats.forEach(function(c){c.subs.forEach(function(s){s.items.forEach(function(it){IDX[it.id]=it;});});});
function fmt(n){return n==null?"—":Number(n).toLocaleString("en-US");}
function tryPin(){var nm=(document.getElementById("cname").value||"").trim();var cr=document.getElementById("ccar").value;var v=(document.getElementById("pin").value||"").trim();if(!nm){document.getElementById("perr").textContent="請先輸入您的姓名";return;}if(!cr){document.getElementById("perr").textContent="請選擇您的車型";return;}var lv=v.toLowerCase(),lp=(D.pin||"").toLowerCase(),ok=false,autoRep=null;if(lv===lp){ok=true;}else if(lv.indexOf(lp)===0){var sfx=lv.slice(lp.length);for(var i=0;i<D.reps.length;i++){if(D.reps[i].k.toLowerCase()===sfx){ok=true;autoRep=D.reps[i].k;break;}}}if(!ok){document.getElementById("perr").textContent="密碼錯誤，請再試一次";return;}custName=nm;custCar=cr;if(autoRep){chosenRep=autoRep;}document.getElementById("gate").style.display="none";document.getElementById("app").style.display="block";renderReps();renderCat();renderCart();var rs=document.querySelector(".repsel");if(rs){rs.style.display=autoRep?"none":"";}}
function renderReps(){var h="";D.reps.forEach(function(r){h+='<button class="rp '+(chosenRep==r.k?"on":"")+'" data-rep="'+r.k+'">'+r.l+'</button>';});document.getElementById("reps").innerHTML=h;}
function setCat(c){active=c;renderCat();}
function exclOf(id){var gs=D.excl||[];for(var i=0;i<gs.length;i++){if(gs[i].indexOf(id)>=0)return gs[i];}return null;}
function tog(id){
  if(cart[id]){
    if(D.reqWire&&id===D.reqWire.w&&D.reqWire.ac.some(function(a){return cart[a];})){alert("已選冷氣，整車配線為必要項目");return;}
    delete cart[id];
  }else{
    var g=exclOf(id);if(g){g.forEach(function(o){if(o!==id)delete cart[o];});}
    cart[id]=1;
    if(D.reqWire&&D.reqWire.w&&D.reqWire.ac.indexOf(id)>=0){cart[D.reqWire.w]=cart[D.reqWire.w]||1;}
  }
  renderCat();renderCart();
}
function rmv(id){delete cart[id];renderCat();renderCart();}
function inc(id){cart[id]=(cart[id]||1)+1;renderCart();}
function dec(id){cart[id]=Math.max(1,(cart[id]||1)-1);renderCart();}
function renderCat(){
var tb='<button class="tab '+(active=="__all"?"on":"")+'" data-cat="__all">全部</button>';
D.cats.forEach(function(c){tb+='<button class="tab '+(active==c.name?"on":"")+'" data-cat="'+c.name+'">'+c.name+'</button>';});
document.getElementById("tabs").innerHTML=tb;
var html="";
D.cats.forEach(function(c){
if(active!="__all"&&active!=c.name){return;}
c.subs.forEach(function(s){
var items=s.items.filter(function(it){if(!kw){return true;}return (it.name+" "+it.model).toLowerCase().indexOf(kw)>=0;});
if(!items.length){return;}
html+='<div class="sub">'+(active=="__all"?c.name+' · ':'')+s.name+(s.name==="冷氣本體"?' <span class="subnote">選任一冷氣會自動附「整車配線」</span>':'')+'</div><div class="grid">';
items.forEach(function(it){
var on=!!cart[it.id];
html+='<div class="card">';
if(it.photo){html+='<div class="ph"><img src="'+it.photo+'"></div>';}
if(it.model){html+='<span class="mdl">'+it.model+'</span>';}
html+='<div class="nm">'+it.name+'</div>';
if(it.incl){html+='<div class="incl">✓ 已含工資</div>';}
if(it.note){html+='<div class="note">⚑ '+it.note+'</div>';}
html+='<div class="ft"><div class="pr">'+(it.price==null?'<span class="tbd">價格待定</span>':'<span class="cur">NT$</span>'+fmt(it.price))+'</div>';
html+='<button class="add '+(on?"on":"")+'" data-tog="'+it.id+'" title="'+(on?"已選，點一下移除":"加入")+'">'+(on?"✓":"＋")+'</button></div></div>';
});
html+='</div>';
});
});
document.getElementById("cat").innerHTML=html||'<div class="empty">找不到品項</div>';
}
function renderCart(){
var ids=Object.keys(cart),html="",sum=0,tbd=false;
document.getElementById("cnt").textContent=ids.length+" 項";
if(!ids.length){document.getElementById("lines").innerHTML='<div class="cempty">從上面挑選您想要的項目</div>';document.getElementById("tot").textContent="NT$0";return;}
ids.forEach(function(id){
var it=IDX[id],n=cart[id],line=it.price==null?null:it.price*n;
if(line!=null){sum+=line;}if(it.price==null){tbd=true;}
html+='<div class="ln"><div class="lh"><div><div class="lnm">'+it.name+'</div>'+(it.model?'<div class="lmd">'+it.model+'</div>':'')+'</div><button class="rmb" data-rm="'+id+'">✕</button></div>';
html+='<div class="lb"><div class="stp"><button data-dec="'+id+'">−</button><b>'+n+'</b><button data-inc="'+id+'">＋</button></div><div class="lt">'+(line==null?'待報價':'NT$'+fmt(line))+'</div></div></div>';
});
document.getElementById("lines").innerHTML=html;
document.getElementById("tot").textContent="NT$"+fmt(sum)+(tbd?"（另含待報價）":"");
}
function makeCode(){
var ids=Object.keys(cart);
if(!chosenRep){alert("請先在上方選擇為您服務的業務");return;}
var other=(document.getElementById("cother").value||"").trim();
var note=(document.getElementById("cnote").value||"").trim();
if(!ids.length&&!other&&!note){alert("還沒有選任何項目");return;}
var arr=ids.map(function(id){var it=IDX[id]||{};return {i:id,q:cart[id],n:it.name||"",mo:it.model||""};});
var payload={r:chosenRep,n:custName,c:custCar,items:arr};
if(other)payload.other=other;
if(note)payload.note=note;
var code="OMA1|"+btoa(unescape(encodeURIComponent(JSON.stringify(payload))));
var ta=document.getElementById("code");ta.value=code;document.getElementById("codewrap").style.display="block";ta.focus();ta.select();
}
function copyCode(){var ta=document.getElementById("code");ta.select();try{navigator.clipboard.writeText(ta.value);}catch(e){try{document.execCommand("copy");}catch(_){}}alert("已複製，請用 LINE 傳給業務");}
document.getElementById("reps").addEventListener("click",function(e){var r=e.target.getAttribute("data-rep");if(r){chosenRep=r;renderReps();}});
document.getElementById("tabs").addEventListener("click",function(e){var c=e.target.getAttribute("data-cat");if(c!=null){setCat(c);}});
document.getElementById("cat").addEventListener("click",function(e){var v=e.target.getAttribute("data-tog");if(v){tog(v);}});
document.getElementById("lines").addEventListener("click",function(e){var t=e.target;if(t.getAttribute("data-rm")){rmv(t.getAttribute("data-rm"));}else if(t.getAttribute("data-inc")){inc(t.getAttribute("data-inc"));}else if(t.getAttribute("data-dec")){dec(t.getAttribute("data-dec"));}});
document.getElementById("pinbtn").addEventListener("click",tryPin);
document.getElementById("pin").addEventListener("keydown",function(e){if(e.key==="Enter"){tryPin();}});
document.getElementById("cname").addEventListener("keydown",function(e){if(e.key==="Enter"){tryPin();}});
document.getElementById("donebtn").addEventListener("click",makeCode);
document.getElementById("copybtn").addEventListener("click",copyCode);
document.getElementById("glogo").innerHTML=D.logo;
(function(){var cs='<option value="">請選擇車型</option>';(D.cars||[]).forEach(function(x){cs+='<option>'+x+'</option>';});document.getElementById("ccar").innerHTML=cs;})();

document.getElementById("pin").focus();
